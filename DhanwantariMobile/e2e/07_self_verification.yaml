# ── Test 3: ContradictionDetector — verify referral not contradicted ──────

- launchApp

- tapOn:
    id: "symptomChecker_start"

# Select symptoms that trigger URGENT risk
- tapOn:
    text: "High Fever"
- tapOn:
    text: "Severe Headache"
- tapOn:
    text: "Neck Stiffness"
- tapOn:
    id: "analyze_symptoms"

- assertVisible:
    id: "diagnosis_result"

# Risk level should show URGENT or IMMEDIATE
- assertVisible:
    id: "risk_level_badge"

# Referral recommendation should be visible
- assertVisible:
    id: "referral_recommendation"

